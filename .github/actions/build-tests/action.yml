name: Build HIL tests (composite)
description: Checkout, install toolchains, build tests for a SoC, upload artifact

inputs:
  event_name:
    description: github.event_name
    required: true

  repository:
    description: owner/repo for workflow_dispatch
    required: true

  branch:
    description: branch/tag to checkout if no SHA
    required: true

  soc:
    description: SoC (e.g. esp32c3)
    required: true

  rust_target:
    description: rust target triple
    required: true

  test_type:
    description: "Type of tests to build: hal|radio|all"
    required: false
    default: "all"

  tests:
    description: Optional comma-separated test names
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      if: ${{ inputs.event_name == 'merge_group' }}
    - uses: actions/checkout@v6
      if: ${{ inputs.event_name == 'workflow_dispatch' }}
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.branch }}

    - if: ${{ !contains(fromJson('["esp32","esp32s2","esp32s3"]'), inputs.soc) }}
      uses: dtolnay/rust-toolchain@v1
      with:
        target: ${{ inputs.rust_target }}
        toolchain: stable
        components: rust-src

    - if: ${{ !contains(fromJson('["esp32","esp32s2","esp32s3"]'), inputs.soc) }}
      name: Install nightly Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        target: ${{ inputs.rust_target }}
        toolchain: nightly
        components: rust-src

    - if: ${{ contains(fromJson('["esp32","esp32s2","esp32s3"]'), inputs.soc) }}
      uses: esp-rs/xtensa-toolchain@v1.6
      with:
        buildtargets: ${{ inputs.soc }}
        default: true
        version: 1.93.0.0

    - name: Build HAL tests
      if: ${{ inputs.test_type == 'hal' || inputs.test_type == 'all' }}
      shell: bash
      run: |
        if [ -n "${{ inputs.tests }}" ]; then
          echo "Building selected HAL tests for ${{ inputs.soc }}: ${{ inputs.tests }}"
          cargo xtask build tests ${{ inputs.soc }} --exclude-radio --tests "${{ inputs.tests }}"
        else
          echo "Building ALL HAL tests for ${{ inputs.soc }}"
          cargo xtask build tests ${{ inputs.soc }} --exclude-radio
        fi

    - name: Move HAL artifacts
      if: ${{ inputs.test_type == 'hal' || inputs.test_type == 'all' }}
      shell: bash
      run: |
        HAL_DIR=target/tests/${{ inputs.soc }}-hal
        SRC_DIR=target/tests/${{ inputs.soc }}

        mkdir -p "$HAL_DIR"
        mv "$SRC_DIR"/* "$HAL_DIR"/ || true

    - name: Build radio tests
      if: ${{ inputs.test_type == 'radio' || inputs.test_type == 'all' }}
      shell: bash
      run: |
        if [ -n "${{ inputs.tests }}" ]; then
          echo "Building selected radio tests for ${{ inputs.soc }}: ${{ inputs.tests }}"
          cargo xtask build tests ${{ inputs.soc }} --only-radio --tests "${{ inputs.tests }}"
        else
          echo "Building ALL radio tests for ${{ inputs.soc }}"
          cargo xtask build tests ${{ inputs.soc }} --only-radio
        fi

    - name: Move radio artifacts
      if: ${{ inputs.test_type == 'radio' || inputs.test_type == 'all' }}
      shell: bash
      run: |
        RADIO_DIR=target/tests/${{ inputs.soc }}-radio
        SRC_DIR=target/tests/${{ inputs.soc }}

        mkdir -p "$RADIO_DIR"
        mv "$SRC_DIR"/* "$RADIO_DIR"/ || true

    - name: Upload HAL test artifact
      if: ${{ inputs.test_type == 'hal' || inputs.test_type == 'all' }}
      uses: actions/upload-artifact@v6
      with:
        name: tests-${{ inputs.soc }}-hal
        path: target/tests/${{ inputs.soc }}-hal
        if-no-files-found: ignore
        overwrite: true

    - name: Upload radio test artifact
      if: ${{ inputs.test_type == 'radio' || inputs.test_type == 'all' }}
      uses: actions/upload-artifact@v6
      with:
        name: tests-${{ inputs.soc }}-radio
        path: target/tests/${{ inputs.soc }}-radio
        if-no-files-found: ignore
        overwrite: true
